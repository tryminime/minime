# MiniMe Local Services
# This file is used by the MiniMe installer to run all required databases locally.
# Managed automatically — do not edit unless you know what you're doing.

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: minime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-minime}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - minime_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minime}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: minime-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - minime_neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: minime-redis
    restart: unless-stopped
    command: redis-server --requirepass ${POSTGRES_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - minime_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${POSTGRES_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: minime-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - minime_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minime_postgres:
    name: minime_postgres
  minime_neo4j:
    name: minime_neo4j
  minime_redis:
    name: minime_redis
  minime_qdrant:
    name: minime_qdrant
