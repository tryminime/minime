apiVersion: apps/v1
kind: Deployment
metadata:
  name: minime-frontend
  namespace: minime
  labels:
    app: minime-frontend
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: minime-frontend
  template:
    metadata:
      labels:
        app: minime-frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/yourusername/minime-frontend:latest  # Update with your registry
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: minime-frontend-config
              key: API_URL
        - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: minime-secrets
              key: STRIPE_PUBLISHABLE_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
      imagePullSecrets:
      - name: ghcr-secret  # If using private registry

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: minime-frontend-hpa
  namespace: minime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: minime-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
