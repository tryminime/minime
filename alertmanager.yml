# Alertmanager Configuration
# Routes alerts to PagerDuty, Slack, and Email

global:
  resolve_timeout: 5m
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  slack_api_url: '${SLACK_WEBHOOK_URL}'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  # Default receiver
  receiver: 'default'
  
  # Group alerts by cluster and alertname
  group_by: ['cluster', 'alertname']
  
  # Wait before sending initial notification
  group_wait: 30s
  
  # Wait before sending notification about new alerts in group
  group_interval: 5m
  
  # Wait before sending notification about resolved alerts
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts -> PagerDuty + Slack
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
    
    - match:
        severity: critical
      receiver: 'slack-critical'
    
    # Warning alerts -> Slack only
    - match:
        severity: warning
      receiver: 'slack-warnings'
    
    # Component-specific routes
    - match:
        component: neo4j
      receiver: 'neo4j-team'
      group_by: ['cluster', 'instance']
    
    - match:
        component: backend
      receiver: 'backend-team'
      group_by: ['cluster', 'instance']

# Inhibition rules (suppress alerts)
inhibit_rules:
  # Suppress warning if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  
  # Suppress individual node alerts if cluster alert is firing
  - source_match:
      alertname: 'Neo4jClusterDegraded'
    target_match:
      alertname: 'Neo4jNodeDown'
    equal: ['cluster']

# Receivers
receivers:
  # Default receiver (catch-all)
  - name: 'default'
    email_configs:
      - to: '${ALERT_EMAIL}'
        from: 'alerts@minime.com'
        smarthost: '${SMTP_HOST}:${SMTP_PORT}'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        headers:
          Subject: '[MiniMe Alert] {{ .GroupLabels.alertname }}'

  # PagerDuty for critical alerts
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: '{{ .GroupLabels.severity }}'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          cluster: '{{ .GroupLabels.cluster }}'
          component: '{{ .GroupLabels.component }}'
        client: 'MiniMe Prometheus'
        client_url: 'https://prometheus.minime.com'

  # Slack for critical alerts
  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        username: 'MiniMe Alerts'
        icon_emoji: ':rotating_light:'
        title: ':fire: CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .GroupLabels.severity }}
          *Component:* {{ .GroupLabels.component }}
          *Firing Alerts:* {{ .Alerts.Firing | len }}
        color: 'danger'
        send_resolved: true

  # Slack for warnings
  - name: 'slack-warnings'
    slack_configs:
      - channel: '#alerts-warnings'
        username: 'MiniMe Alerts'
        icon_emoji: ':warning:'
        title: ':warning: WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Component:* {{ .GroupLabels.component }}
        color: 'warning'
        send_resolved: true

  # Neo4j team
  - name: 'neo4j-team'
    email_configs:
      - to: 'neo4j-team@minime.com'
        from: 'alerts@minime.com'
        smarthost: '${SMTP_HOST}:${SMTP_PORT}'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        headers:
          Subject: '[Neo4j Alert] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#neo4j-alerts'
        username: 'Neo4j Alerts'
        icon_emoji: ':database:'
        title: 'Neo4j Alert: {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'

  # Backend team
  - name: 'backend-team'
    email_configs:
      - to: 'backend-team@minime.com'
        from: 'alerts@minime.com'
        smarthost: '${SMTP_HOST}:${SMTP_PORT}'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        headers:
          Subject: '[Backend Alert] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#backend-alerts'
        username: 'Backend Alerts'
        icon_emoji: ':computer:'
        title: 'Backend Alert: {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'

# Environment variables required:
# - SLACK_WEBHOOK_URL
# - PAGERDUTY_SERVICE_KEY
# - ALERT_EMAIL
# - SMTP_HOST
# - SMTP_PORT
# - SMTP_USER
# - SMTP_PASSWORD
