# HAProxy Configuration for Neo4j Cluster Load Balancing

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    timeout tunnel  1h

# Statistics endpoint
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats show-legends
    stats show-node

# Neo4j HTTP Frontend (Browser)
frontend neo4j_http_frontend
    bind *:7474
    mode http
    default_backend neo4j_http_backend

# Neo4j HTTP Backend (Round Robin)
backend neo4j_http_backend
    mode http
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server neo4j-core-1 neo4j-core-1:7474 check inter 5s fall 3 rise 2
    server neo4j-core-2 neo4j-core-2:7474 check inter 5s fall 3 rise 2
    server neo4j-core-3 neo4j-core-3:7474 check inter 5s fall 3 rise 2

# Neo4j Bolt Frontend (Application Connections)
frontend neo4j_bolt_frontend
    bind *:7687
    mode tcp
    default_backend neo4j_bolt_backend

# Neo4j Bolt Backend (Least Connections)
backend neo4j_bolt_backend
    mode tcp
    balance leastconn
    option tcp-check
    server neo4j-core-1 neo4j-core-1:7687 check inter 5s fall 3 rise 2
    server neo4j-core-2 neo4j-core-2:7687 check inter 5s fall 3 rise 2
    server neo4j-core-3 neo4j-core-3:7687 check inter 5s fall 3 rise 2
