# Prometheus Configuration for MiniMe Knowledge Graph
# Collects metrics from all services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'minime-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI Backend
  - job_name: 'backend-api'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'backend:8000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend-api'

  # Celery Workers
  - job_name: 'celery-workers'
    static_configs:
      - targets:
          - 'celery-exporter:9540'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'celery-worker'

  # Neo4j Cluster - Core 1
  - job_name: 'neo4j-core-1'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'neo4j-core-1:2004'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'neo4j-core-1'

  # Neo4j Cluster - Core 2
  - job_name: 'neo4j-core-2'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'neo4j-core-2:2004'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'neo4j-core-2'

  # Neo4j Cluster - Core 3
  - job_name: 'neo4j-core-3'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'neo4j-core-3:2004'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'neo4j-core-3'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # Qdrant
  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'qdrant:6333'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'qdrant'

  # HAProxy (Neo4j Load Balancer)
  - job_name: 'haproxy'
    static_configs:
      - targets:
          - 'haproxy-exporter:9101'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'neo4j-lb'

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'host-system'

  # cAdvisor (Container Metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - 'cadvisor:8080'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker-containers'
