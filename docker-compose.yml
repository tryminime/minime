version: '3.8'

services:
  # PostgreSQL - Primary database for users, activities, events
  postgres:
    image: postgres:15-alpine
    container_name: minime-postgres
    environment:
      POSTGRES_USER: minime
      POSTGRES_PASSWORD: minime_dev_password
      POSTGRES_DB: minime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schemas/postgres_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minime"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minime-network

  # Neo4j - Knowledge graph database
  neo4j:
    image: neo4j:5.15-community
    container_name: minime-neo4j
    environment:
      NEO4J_AUTH: neo4j/minime_dev_password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./backend/database/schemas/neo4j_schema.cypher:/docker-entrypoint-initdb.d/init.cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "minime_dev_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minime-network

  # Redis - Cache, sessions, real-time coordination
  redis:
    image: redis:7-alpine
    container_name: minime-redis
    command: redis-server --requirepass minime_dev_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minime_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minime-network

  # Qdrant - Vector database for embeddings
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: minime-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minime-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minime-backend
    environment:
      - DATABASE_URL=postgresql://minime:minime_dev_password@postgres:5432/minime
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=minime_dev_password
      - REDIS_URL=redis://:minime_dev_password@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=dev_secret_key_change_in_production
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - minime-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  qdrant_data:

networks:
  minime-network:
    driver: bridge
