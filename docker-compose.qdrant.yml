# Qdrant Vector Database Deployment
# Production-ready configuration with persistence and monitoring

version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    environment:
      # Performance settings
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
      - QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS=2

      # Storage settings
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__STORAGE__SNAPSHOTS_PATH=/qdrant/snapshots

      # Service settings
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__ENABLE_TLS=false

      # Telemetry (disable for privacy)
      - QDRANT__TELEMETRY_DISABLED=true

      # Logging
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - qdrant-data:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    networks:
      - minime-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6333/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 4G
          cpus: '2'
    restart: unless-stopped

  # Qdrant Backup Service (Daily snapshots)
  qdrant-backup:
    image: alpine:3.18
    container_name: qdrant-backup
    volumes:
      - qdrant-snapshots:/snapshots:ro
      - ./backups/qdrant:/backups
    networks:
      - minime-network
    command: >
      sh -c " while true; do
        echo 'Creating Qdrant snapshot backup...'
        DATE=$$(date +%Y%m%d_%H%M%S)
        tar -czf /backups/qdrant-snapshot-$$DATE.tar.gz -C /snapshots .
        echo 'Backup created: qdrant-snapshot-$$DATE.tar.gz'
        
        # Keep only last 7 days
        find /backups -name 'qdrant-snapshot-*.tar.gz' -mtime +7 -delete
        
        # Sleep for 24 hours
        sleep 86400
      done "
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant-data:
    driver: local
  qdrant-snapshots:
    driver: local

networks:
  minime-network:
    external: true

# Usage:
# 1. Create external network: docker network create minime-network
# 2. Start Qdrant: docker-compose -f docker-compose.qdrant.yml up -d
# 3. Access API: http://localhost:6333
# 4. Access dashboard: http://localhost:6333/dashboard
