# Neo4j High Availability Cluster Configuration
# 3-node cluster with causal clustering

version: '3.8'

services:
  # Neo4j Core Server 1 (Leader)
  neo4j-core-1:
    image: neo4j:5.15-enterprise
    container_name: neo4j-core-1
    hostname: neo4j-core-1
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes

      # Cluster configuration
      - NEO4J_initial_dbms_default__database=neo4j
      - NEO4J_dbms_mode=CORE
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__formation=3
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__runtime=3
      - NEO4J_causal__clustering_initial__discovery__members=neo4j-core-1:5000,neo4j-core-2:5000,neo4j-core-3:5000
      - NEO4J_dbms_connector_bolt_advertised__address=neo4j-core-1:7687
      - NEO4J_dbms_connector_http_advertised__address=neo4j-core-1:7474

      # Memory settings
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G

      # GDS and APOC
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
      - NEO4JLABS_PLUGINS=["graph-data-science", "apoc"]

      # Metrics
      - NEO4J_metrics_enabled=true
      - NEO4J_metrics_prometheus_enabled=true
      - NEO4J_metrics_prometheus_endpoint=0.0.0.0:2004
    volumes:
      - neo4j-core-1-data:/data
      - neo4j-core-1-logs:/logs
      - neo4j-core-1-plugins:/plugins
    networks:
      - neo4j-cluster
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Neo4j Core Server 2
  neo4j-core-2:
    image: neo4j:5.15-enterprise
    container_name: neo4j-core-2
    hostname: neo4j-core-2
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_initial_dbms_default__database=neo4j
      - NEO4J_dbms_mode=CORE
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__formation=3
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__runtime=3
      - NEO4J_causal__clustering_initial__discovery__members=neo4j-core-1:5000,neo4j-core-2:5000,neo4j-core-3:5000
      - NEO4J_dbms_connector_bolt_advertised__address=neo4j-core-2:7687
      - NEO4J_dbms_connector_http_advertised__address=neo4j-core-2:7474
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
      - NEO4JLABS_PLUGINS=["graph-data-science", "apoc"]
      - NEO4J_metrics_enabled=true
      - NEO4J_metrics_prometheus_enabled=true
      - NEO4J_metrics_prometheus_endpoint=0.0.0.0:2004
    volumes:
      - neo4j-core-2-data:/data
      - neo4j-core-2-logs:/logs
      - neo4j-core-2-plugins:/plugins
    networks:
      - neo4j-cluster
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - neo4j-core-1

  # Neo4j Core Server 3
  neo4j-core-3:
    image: neo4j:5.15-enterprise
    container_name: neo4j-core-3
    hostname: neo4j-core-3
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_initial_dbms_default__database=neo4j
      - NEO4J_dbms_mode=CORE
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__formation=3
      - NEO4J_causal__clustering_minimum__core__cluster__size__at__runtime=3
      - NEO4J_causal__clustering_initial__discovery__members=neo4j-core-1:5000,neo4j-core-2:5000,neo4j-core-3:5000
      - NEO4J_dbms_connector_bolt_advertised__address=neo4j-core-3:7687
      - NEO4J_dbms_connector_http_advertised__address=neo4j-core-3:7474
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
      - NEO4JLABS_PLUGINS=["graph-data-science", "apoc"]
      - NEO4J_metrics_enabled=true
      - NEO4J_metrics_prometheus_enabled=true
      - NEO4J_metrics_prometheus_endpoint=0.0.0.0:2004
    volumes:
      - neo4j-core-3-data:/data
      - neo4j-core-3-logs:/logs
      - neo4j-core-3-plugins:/plugins
    networks:
      - neo4j-cluster
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - neo4j-core-1
      - neo4j-core-2

  # HAProxy Load Balancer for Neo4j
  neo4j-lb:
    image: haproxy:2.8-alpine
    container_name: neo4j-lb
    ports:
      - "7477:7474" # HTTP load balanced
      - "7690:7687" # Bolt load balanced
      - "8404:8404" # HAProxy stats
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - neo4j-cluster
    depends_on:
      - neo4j-core-1
      - neo4j-core-2
      - neo4j-core-3
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8404/stats" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  neo4j-core-1-data:
  neo4j-core-1-logs:
  neo4j-core-1-plugins:
  neo4j-core-2-data:
  neo4j-core-2-logs:
  neo4j-core-2-plugins:
  neo4j-core-3-data:
  neo4j-core-3-logs:
  neo4j-core-3-plugins:


networks:
  neo4j-cluster:
    driver: bridge

# Usage:
# 1. Set NEO4J_PASSWORD environment variable
# 2. docker-compose -f docker-compose.neo4j-cluster.yml up -d
# 3. Wait for cluster formation (check logs)
# 4. Connect via load balancer: bolt://localhost:7690
