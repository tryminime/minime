name: Desktop Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxss-dev \
            libx11-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'MiniMe Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## MiniMe Desktop ${{ github.ref_name }}
            
            ### What's New
            - Cross-platform activity tracking (macOS, Windows, Linux)
            - Full system tray with Start/Stop/Pause controls
            - Pomodoro focus timer
            - Auto-update support
            
            ### Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `MiniMe_*_aarch64.dmg` |
            | macOS (Intel) | `MiniMe_*_x64.dmg` |
            | Windows | `MiniMe_*_x64-setup.exe` or `MiniMe_*_x64_en-US.msi` |
            | Linux (Debian/Ubuntu) | `MiniMe_*_amd64.deb` |
            | Linux (Universal) | `MiniMe_*_amd64.AppImage` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}
