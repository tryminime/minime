name: Frontend CI - Lint, Test, Build

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'website/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'website/**'

jobs:
  lint-and-test:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: ./website
        run: npm ci

      - name: Run ESLint
        working-directory: ./website
        run: npm run lint

      - name: Type check (TypeScript)
        working-directory: ./website
        run: npx tsc --noEmit

  build:
    name: Build Next.js Application
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: ./website
        run: npm ci

      - name: Build application
        working-directory: ./website
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST }}

      - name: Check build output
        working-directory: ./website
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed - .next directory not found"
            exit 1
          fi
          echo "Build successful - .next directory created"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./website
        run: |
          docker build -t minime-frontend:${{ github.sha }} .

      - name: Check image size
        run: |
          IMAGE_SIZE=$(docker images minime-frontend:${{ github.sha }} --format "{{.Size}}")
          echo "Image size: $IMAGE_SIZE"
          
          # Get size in MB (rough approximation)          SIZE_MB=$(docker images minime-frontend:${{ github.sha }} --format "{{.Size}}" | sed 's/MB//' | sed 's/GB/*1000/')
          echo "Built image size: ${SIZE_MB}MB"
