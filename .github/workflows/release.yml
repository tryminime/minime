name: Release MiniMe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: false

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxss-dev \
            libx11-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: './desktop'
          tagName: ${{ github.ref_name }}
          releaseName: 'MiniMe ${{ github.ref_name }}'
          releaseBody: |
            ## MiniMe ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `MiniMe_*_aarch64.dmg` |
            | macOS (Intel) | `MiniMe_*_x64.dmg` |
            | Windows | `MiniMe_*_x64-setup.exe` |
            | Linux (AppImage) | `MiniMe_*_amd64.AppImage` |
            | Linux (Debian) | `MiniMe_*_amd64.deb` |
          releaseDraft: true
          prerelease: false
          args: '--target ${{ matrix.target }}'

  build-backend-bundle:
    name: Build backend bundle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Bundle installer scripts
        run: |
          mkdir -p dist/installer
          cp installer/setup.sh dist/installer/ 2>/dev/null || true
          cp installer/setup.ps1 dist/installer/ 2>/dev/null || true
          cp installer/docker-compose.local.yml dist/installer/ 2>/dev/null || true
          tar czf minime-installer-scripts.tar.gz -C dist/installer .

      - name: Upload installer scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: minime-installer-scripts.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
