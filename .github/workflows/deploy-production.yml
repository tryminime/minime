name: Deploy to Vercel (Production)

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'production'

jobs:
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.tryminime.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Override Git Author for Vercel
        run: |
          git config user.email "tryminime.online@gmail.com"
          git config user.name "tryminime"

      - name: Pull Vercel Environment Information
        working-directory: ./website
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_AUTHOR_EMAIL: 'tryminime.online@gmail.com'
          VERCEL_GIT_COMMIT_AUTHOR_LOGIN: 'tryminime'

      - name: Build Project Artifacts
        working-directory: ./website
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_AUTHOR_EMAIL: 'tryminime.online@gmail.com'
          VERCEL_GIT_COMMIT_AUTHOR_LOGIN: 'tryminime'
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_PROD || 'https://api.tryminime.com' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_PROD || '' }}

      - name: Deploy to Vercel Production
        working-directory: ./website
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_AUTHOR_EMAIL: 'tryminime.online@gmail.com'
          VERCEL_GIT_COMMIT_AUTHOR_LOGIN: 'tryminime'

      - name: Deployment Summary
        run: |
          echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://www.tryminime.com" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack Notification (Success)
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "✅ Production deployment succeeded for ${{ github.sha }}"}

      - name: Send Slack Notification (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "❌ Production deployment FAILED for ${{ github.sha }} — check Actions logs"}
