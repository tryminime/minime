<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniMe - Activity Intelligence</title>
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- MiniMe Design System -->
  <link rel="stylesheet" href="../styles/design-system.css">
  <!-- Popup Styles -->
  <link rel="stylesheet" href="popup-enhanced.css">
</head>

<body>
  <div class="popup-container">

    <!-- HEADER SECTION (48px) -->
    <header class="popup-header">
      <div class="header-left">
        <img src="../assets/MiniMe-icon.png" alt="MiniMe" class="header-logo">
        <h1 class="header-title">MiniMe</h1>
      </div>
      <button class="header-settings" id="settingsBtn" title="Settings">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="10" cy="10" r="3" />
          <path
            d="M13.7 6.3a7 7 0 0 1 0 7.4M6.3 13.7a7 7 0 0 1 0-7.4M13.7 13.7a7 7 0 0 0 0-7.4M6.3 6.3a7 7 0 0 0 0 7.4" />
        </svg>
      </button>
    </header>

    <!-- STATUS INDICATOR (32px) -->
    <div class="status-indicator" id="statusIndicator">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Tracking activity...</span>
    </div>

    <!-- CURRENT ACTIVITY CARD (64px) -->
    <div class="current-activity" id="currentActivity">
      <img class="activity-favicon" id="currentFavicon" src="../assets/MiniMe-icon.png" alt="">
      <div class="activity-info">
        <div class="activity-domain" id="currentDomain">Loading...</div>
        <div class="activity-time" id="currentTime">0s</div>
      </div>
      <div class="live-indicator">●</div>
    </div>

    <!-- TODAY'S STATS (60px) -->
    <div class="stats-card">
      <div class="stats-title">ACTIVITY TODAY</div>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-icon">⏱️</div>
          <div class="stat-value" id="totalTime">0h 0m</div>
          <div class="stat-label">Total time</div>
        </div>
        <div class="stat">
          <div class="stat-icon">🌐</div>
          <div class="stat-value" id="pagesVisited">0</div>
          <div class="stat-label">Pages</div>
        </div>
        <div class="stat">
          <div class="stat-icon">🏷️</div>
          <div class="stat-value" id="entitiesFound">0</div>
          <div class="stat-label">Entities</div>
        </div>
      </div>
    </div>

    <!-- RECENT ACTIVITIES (200px scrollable) -->
    <div class="recent-activities">
      <div class="recent-title">RECENT ACTIVITY</div>
      <div class="recent-list" id="recentList">
        <!-- Populated by JavaScript -->
        <div class="activity-item">
          <img class="favicon" src="../assets/MiniMe-icon.png" alt="">
          <div class="domain">No recent activity</div>
          <div class="time">--</div>
        </div>
      </div>
    </div>

    <!-- ACTION BUTTONS (48px) -->
    <div class="action-buttons">
      <button class="btn btn-secondary" id="pauseBtn">
        <span id="pauseBtnText">Pause</span>
      </button>
      <button class="btn btn-primary" id="dashboardBtn">
        <span>Dashboard</span>
      </button>
      <button class="btn btn-secondary" id="syncBtn">
        <span>Sync</span>
      </button>
    </div>

  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
